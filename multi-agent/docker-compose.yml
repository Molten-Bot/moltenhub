services:
  statocyst:
    image: golang:1.22
    working_dir: /app
    command: ["/usr/local/go/bin/go", "run", "./cmd/statocystd"]
    volumes:
      - ../:/app
    ports:
      - "127.0.0.1:18080:8080"
    environment:
      TZ: UTC

  shrimp:
    depends_on:
      - statocyst
    build:
      context: ./shrimp
      dockerfile: Dockerfile
    image: openclaw-agent-code:local-shrimp
    volumes:
      - ./shrimp/mnt/workspace:/mnt/workspace
      - ./shrimp/mnt/skills:/mnt/skills
      - ../skills/openclaw-bind-agent:/mnt/skills/openclaw-bind-agent:ro
      - ../skills/openclaw-exchange-messages:/mnt/skills/openclaw-exchange-messages:ro
      - ../skills/openclaw-pull-bound-agents:/mnt/skills/openclaw-pull-bound-agents:ro
      - ./shrimp/mnt/memory:/mnt/memory
      - ./shrimp/openclaw.json:/home/moltenbot/.openclaw/openclaw.json:ro
      - ./shrimp/SOUL.md:/mnt/workspace/SOUL.md:ro
    ports:
      - "127.0.0.1:18789:18789"
      - "127.0.0.1:18792:18792"
    environment:
      TZ: UTC
      NODE_ENV: production
      STATOCYST_BASE_URL: http://statocyst:8080
    env_file:
      - ./shrimp/.env

  crab:
    depends_on:
      - statocyst
    build:
      context: ./crab
      dockerfile: Dockerfile
    image: openclaw-agent-code:local-crab
    volumes:
      - ./crab/mnt/workspace:/mnt/workspace
      - ./crab/mnt/skills:/mnt/skills
      - ../skills/openclaw-bind-agent:/mnt/skills/openclaw-bind-agent:ro
      - ../skills/openclaw-exchange-messages:/mnt/skills/openclaw-exchange-messages:ro
      - ../skills/openclaw-pull-bound-agents:/mnt/skills/openclaw-pull-bound-agents:ro
      - ./crab/mnt/memory:/mnt/memory
      - ./crab/openclaw.json:/home/moltenbot/.openclaw/openclaw.json:ro
      - ./crab/SOUL.md:/mnt/workspace/SOUL.md:ro
    ports:
      - "127.0.0.1:28789:18789"
      - "127.0.0.1:28792:18792"
    environment:
      TZ: UTC
      NODE_ENV: production
      STATOCYST_BASE_URL: http://statocyst:8080
    env_file:
      - ./crab/.env
