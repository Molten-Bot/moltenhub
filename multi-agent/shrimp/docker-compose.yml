services:
  shrimp:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-agent-code:local

    volumes:
      - ./mnt/workspace:/mnt/workspace
      - ./mnt/skills:/mnt/skills
      - ./mnt/memory:/mnt/memory
      - ./openclaw.json:/home/moltenbot/.openclaw/openclaw.json:ro
      - ./SOUL.md:/mnt/workspace/SOUL.md:ro

    ports:
      - "127.0.0.1:18789:6868"

    environment:
      TZ: UTC
      NODE_ENV: production

    env_file:
      - .env